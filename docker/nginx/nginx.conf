# Keep this sidecar intentionally small. On shared VPS hosts, nginx's
# auto worker tuning can spawn one worker per CPU and exhaust kernel AIO
# resources, causing `io_setup() failed` and an unhealthy container.
worker_processes 2;
worker_rlimit_nofile 8192;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
  worker_connections 2048;
  multi_accept on;
}

http {
  access_log /dev/stdout;
  server_tokens off;
  sendfile off;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65s;
  types_hash_max_size 2048;

  # Include auto-generated geo-block map variables (one .conf per station)
  include /etc/nginx/geoblock.d/*.conf;

  upstream icecast_backend {
    server icecast:8000;
  }

  server {
    listen 8080;
    server_name _;

    # Health check
    location = /health {
      access_log off;
      add_header Content-Type text/plain always;
      add_header X-Content-Type-Options nosniff always;
      return 200 "ok\n";
    }

    # All Icecast traffic — per-station geo checks are injected
    # by the auto-generated .conf files in /etc/nginx/geoblock.d/
    location / {
      proxy_pass http://icecast_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_cache off;
      proxy_connect_timeout 10s;
      proxy_send_timeout 3600s;
      proxy_read_timeout 3600s;
      add_header X-Content-Type-Options nosniff always;
    }
  }
}
