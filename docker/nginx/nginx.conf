worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  access_log /dev/stdout;

  # Include auto-generated geo-block map variables (one .conf per station)
  include /etc/nginx/geoblock.d/*.conf;

  upstream icecast_backend {
    server icecast:8000;
  }

  server {
    listen 8080;
    server_name _;

    # Health check
    location /health {
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # All Icecast traffic — per-station geo checks are injected
    # by the auto-generated .conf files in /etc/nginx/geoblock.d/
    location / {
      proxy_pass http://icecast_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
    }
  }
}
